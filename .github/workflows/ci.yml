name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  zsh-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
      - name: Syntax check
        run: zsh -n bark.plugin.zsh
      - name: Smoke source
        run: zsh -fc 'source ./bark.plugin.zsh; typeset -f bark >/dev/null'
